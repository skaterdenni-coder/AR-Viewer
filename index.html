<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />  <title>Snap2XR | AR Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      --primary-blue: #004a99; --accent-orange: #ff8c00; --bg-light: #f8f9fa;
      --text-dark: #1a1a1a; --card-bg: #ffffff; --border-color: #e0e0e0;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-light); color: var(--text-dark); }
    .container { max-width: 900px; margin: 0 auto; padding: 20px 15px; text-align: center; }
    header { margin-bottom: 20px; }
    .logo-text { font-size: 38px; font-weight: 800; margin: 0; background: linear-gradient(90deg, var(--primary-blue), var(--accent-orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card { background: var(--card-bg); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .status { padding: 12px; margin: 15px 0; border-radius: 10px; font-weight: 600; display: none; }
    .status.loading { display: block; background: #fff3e0; color: #e65100; }
    .status.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .status.error { display: block; background: #ffebee; color: #c62828; }
    .viewer-container { display: none; }
    .viewer-container.active { display: block; }
    model-viewer { width: 100%; height: 65vh; min-height: 400px; background-color: #fff; border-radius: 15px; }
    .controls-bar { display: flex; justify-content: center; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
    .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: transform 0.1s; display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .btn-outline { background: #fff; border: 1px solid var(--border-color); color: var(--text-dark); }
    .btn-accent { background: var(--accent-orange); color: #fff; }
    #upload-section { display: block; }
    body.app-mode #upload-section { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 class="logo-text">Snap2XR</h1>
      <p style="color:#666; margin:5px 0 20px;">3D Model Viewer</p>
    </header>

    <div id="status" class="status"></div>

    <div class="card" id="upload-section">
      <p>Warte auf Modell aus der App oder Datei auswählen...</p>
      <input type="file" id="fileInput" accept=".glb" style="margin-top:10px;"/>
    </div>

    <div class="viewer-container" id="viewer-container">
      <div class="card">
        <model-viewer id="main-viewer" camera-controls auto-rotate ar ar-modes="webxr scene-viewer quick-look"></model-viewer>
        <div class="controls-bar">
          <button class="btn btn-outline" id="btn-reset">↺ Reset</button>
          <button class="btn btn-accent" id="btn-ar">✨ AR Starten</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const viewer = document.getElementById('main-viewer');
    const container = document.getElementById('viewer-container');
    const status = document.getElementById('status');

    function showStatus(msg, type) {
      status.innerText = msg;
      status.className = `status ${type}`;
    }

    // --- DIESE FUNKTION WIRD VON DER APP AUFGERUFEN ---
    window.receiveModelFromApp = function(base64Data) {
      try {
        showStatus('⏳ Modell wird verarbeitet...', 'loading');
        document.body.classList.add('app-mode');

        // Base64 zurück in eine Datei (Blob) verwandeln
        const byteCharacters = atob(base64Data);
        const byteNumbers = new Array(byteCharacters.length);
        for (let i = 0; i < byteCharacters.length; i++) {
          byteNumbers[i] = byteCharacters.charCodeAt(i);
        }
        const byteArray = new Uint8Array(byteNumbers);
        const blob = new Blob([byteArray], {type: 'model/gltf-binary'});
        
        // Lokale URL für den Viewer erstellen
        const url = URL.createObjectURL(blob);
        
        viewer.src = url;
        container.classList.add('active');
        showStatus('✅ Modell erfolgreich aus App geladen!', 'success');
      } catch (err) {
        showStatus('❌ Fehler beim Verarbeiten der App-Daten', 'error');
        console.error(err);
      }
    };

    // Manueller Upload (Fallback)
    document.getElementById('fileInput').onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        viewer.src = URL.createObjectURL(file);
        container.classList.add('active');
        showStatus('✅ Datei geladen', 'success');
      }
    };

    document.getElementById('btn-reset').onclick = () => viewer.cameraOrbit = '0deg 75deg 105%';
    document.getElementById('btn-ar').onclick = () => viewer.activateAR();
  </script>
</body>
</html>
