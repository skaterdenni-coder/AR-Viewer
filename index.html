<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="no-referrer-when-downgrade" />
  <title>AR Model Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    :root{
      --bg:#f5f6f7; --text:#111; --card:#fff; --border:#e6e6e6;
      --btn2:#2d7d46; --accent:#007AFF;
    }
    body{ margin:0; font-family: -apple-system, system-ui, Arial, sans-serif; background:var(--bg); color:var(--text); }
    .wrap{ max-width: 980px; margin: 0 auto; padding: 20px 16px; text-align:center; }
    h1{ margin: 10px 0; font-size: 28px; font-weight: 800; letter-spacing: -1px; }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:20px; padding: 20px; margin: 15px auto; box-shadow: 0 4px 15px rgba(0,0,0,.05); }
    .uploadBox{ background: #f0f8f4; border: 2px dashed var(--btn2); border-radius: 14px; padding: 25px; cursor: pointer; }
    .status{ padding: 12px; margin: 15px 0; border-radius: 12px; display: none; font-weight: 600; font-size: 13px; }
    .status.success{ display: block; background: #d4edda; color: #155724; }
    .status.loading{ display: block; background: #e1f5fe; color: #01579b; }
    #shareArea { display: none; margin-top: 15px; }
    .share-flex { display: flex; align-items: center; justify-content: center; gap: 15px; background: #fdfdfd; padding: 12px; border-radius: 14px; border: 1px solid #eee; flex-wrap: wrap; }
    .shareLinkBox { background: #fff; border: 1px solid #ddd; padding: 8px; border-radius: 8px; font-family: monospace; font-size: 10px; color: var(--accent); cursor: pointer; word-break: break-all; text-align: left; flex: 1; min-width: 150px; }
    .viewerBox{ background:var(--card); border:1px solid var(--border); border-radius:20px; padding: 12px; display: none; }
    .viewerBox.active{ display: block; }
    model-viewer{ width: 100%; height: 55vh; min-height: 380px; background:#f8f9fa; border-radius: 16px; }
    .viewerBar{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top: 15px; }
    button.ui{ border:1px solid var(--border); background:#fff; border-radius: 10px; padding: 10px 16px; font-weight: 700; cursor:pointer; font-size: 14px; }
    button#btnAR { background: var(--accent); color: #fff; border-color: var(--accent); }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>AR Modell Viewer</h1>
    
    <div class="card" id="uploadCard">
      <div class="uploadBox" onclick="document.getElementById('fileInput').click()">
        <p>📁 Modell hochladen (.glb)</p>
        <input type="file" id="fileInput" accept=".glb" style="display:none" />
      </div>
      <div id="status" class="status"></div>
      <div id="shareArea">
        <div class="share-flex">
          <div id="shareLinkDisplay" class="shareLinkBox" onclick="copyLink()"></div>
          <div id="qrcode"></div>
        </div>
      </div>
    </div>

    <div class="card viewerBox" id="viewerBox">
      <model-viewer id="mv" camera-controls auto-rotate ar ar-modes="webxr scene-viewer quick-look" bounds="tight" crossorigin="anonymous"></model-viewer>
      <div class="viewerBar">
        <button class="ui" onclick="mv.cameraOrbit = '0deg 75deg auto'">↩️ Reset</button>
        <button class="ui" id="btnAR">📱 AR starten</button>
        <button class="ui" id="btnDownload" style="display:none">💾 Download</button>
      </div>
    </div>
  </div>

  <script>
    const mv = document.getElementById('mv');
    const status = document.getElementById('status');
    const qrcodeDiv = document.getElementById('qrcode');
    const shareArea = document.getElementById('shareArea');
    const shareLinkDisplay = document.getElementById('shareLinkDisplay');
    let currentUrl = "";

    function showStatus(msg, type) {
      status.textContent = msg;
      status.className = `status ${type}`;
      status.style.display = 'block';
    }

    // Funktion, die prüft ob eine URL eine GLB Datei ist (ignoriert URL-Parameter)
    function isGlbUrl(url) {
      try {
        const path = new URL(url).pathname;
        return path.toLowerCase().endsWith('.glb');
      } catch (e) {
        return url.toLowerCase().includes('.glb');
      }
    }

    async function backgroundUpload(blob) {
      const fd = new FormData();
      fd.append('reqtype', 'fileupload');
      fd.append('time', '24h');
      fd.append('fileToUpload', blob, "model.glb");
      try {
        const res = await fetch('https://litterbox.catbox.moe/resources/internals/api.php', { method: 'POST', body: fd });
        const fileUrl = await res.text();
        if (!fileUrl.startsWith('http')) return;
        
        currentUrl = window.location.origin + window.location.pathname + '?model=' + encodeURIComponent(fileUrl.trim());
        shareLinkDisplay.textContent = currentUrl;
        qrcodeDiv.innerHTML = "";
        new QRCode(qrcodeDiv, { text: currentUrl, width: 70, height: 70 });
        shareArea.style.display = "block";
        document.getElementById('btnDownload').style.display = "inline-block";
        showStatus("✅ Link erstellt (24h gültig)", "success");
      } catch(e) { 
        console.error("Litterbox Upload Fehler:", e);
      }
    }

    function initViewer(url) {
      mv.src = url;
      document.getElementById('viewerBox').classList.add('active');
    }

    document.getElementById('fileInput').onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        initViewer(URL.createObjectURL(file));
        showStatus("🚀 Modell wird verarbeitet...", "loading");
        backgroundUpload(file);
      }
    };

    window.copyLink = () => {
      navigator.clipboard.writeText(currentUrl).then(() => alert("Link kopiert!"));
    };

    document.getElementById('btnAR').onclick = () => mv.activateAR();
    document.getElementById('btnDownload').onclick = () => {
      const a = document.createElement('a'); a.href = mv.src; a.download = "modell.glb"; a.click();
    };

    // Logik beim Seitenaufruf
    const params = new URLSearchParams(window.location.search);
    const tripo = params.get('tripo');
    const model = params.get('model');

    const sourceUrl = tripo || model;

    if (sourceUrl) {
      // Wir prüfen, ob die URL (vor den Parametern) auf .glb endet
      if (isGlbUrl(sourceUrl)) {
        initViewer(sourceUrl);
        showStatus("📦 Modell lädt...", "loading");
        
        // Wenn es ein tripo link ist, spiegeln wir ihn für den share-link zu litterbox
        if (tripo) {
          fetch(tripo).then(r => r.blob()).then(backgroundUpload).catch(() => {
            showStatus("✅ Modell geladen", "success");
          });
        } else {
          // Bereits ein Litterbox link
          currentUrl = window.location.href;
          shareLinkDisplay.textContent = currentUrl;
          new QRCode(qrcodeDiv, { text: currentUrl, width: 70, height: 70 });
          shareArea.style.display = "block";
          document.getElementById('btnDownload').style.display = "inline-block";
          showStatus("✅ Modell geladen", "success");
        }
      } else {
        showStatus("❌ Keine gültige .glb Datei gefunden.", "error");
      }
    }
  </script>
</body>
</html>
