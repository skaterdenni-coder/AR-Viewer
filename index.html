<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Model Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    :root{
      --bg:#f5f6f7; --text:#111; --muted:#555; --card:#fff; --border:#e6e6e6;
      --btn2:#2d7d46; --accent:#007AFF;
    }
    * { box-sizing: border-box; }
    body{ margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); }
    .wrap{ max-width: 980px; margin: 0 auto; padding: 26px 16px 42px; text-align:center; }
    h1{ margin: 6px 0 10px; font-size: 34px; font-weight: 800; letter-spacing: -0.5px; }
    
    .card{
      background:var(--card); border:1px solid var(--border); border-radius:20px;
      padding: 20px; margin: 14px auto;
      box-shadow: 0 4px 12px rgba(0,0,0,.05);
    }
    
    .uploadBox{
      background: #f0f8f4; border: 2px dashed var(--btn2);
      border-radius: 14px; padding: 30px 20px; text-align: center;
      cursor: pointer; transition: all 0.2s;
    }
    .uploadBox:hover { background: #e6f4ed; }
    .uploadBox p{ margin: 0; color: var(--btn2); font-weight: 600; }
    .uploadBox input{ display: none; }
    
    .status{
      padding: 14px; margin: 15px 0; border-radius: 12px;
      display: none; font-weight: 600; text-align: center; font-size: 14px;
    }
    .status.success{ display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .status.loading{ display: block; background: #e1f5fe; color: #01579b; border: 1px solid #b3e5fc; }

    #shareArea { display: none; margin-top: 15px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .share-flex { 
      display: flex; align-items: center; justify-content: center; 
      gap: 15px; background: #fdfdfd; padding: 15px; border-radius: 14px; border: 1px solid #eee;
    }
    .link-box { flex: 1; text-align: left; }
    .shareLinkBox {
      background: #fff; border: 1px solid #ddd; padding: 10px;
      margin-top: 5px; border-radius: 8px; font-family: monospace;
      font-size: 11px; color: var(--accent); cursor: pointer; word-break: break-all;
    }
    #qrcode { background: #fff; padding: 5px; border-radius: 8px; border: 1px solid #eee; }

    .viewerBox{
      background:var(--card); border:1px solid var(--border); border-radius:20px;
      padding: 12px; margin-top: 18px; display: none;
    }
    .viewerBox.active{ display: block; }
    
    model-viewer{
      width: 100%; height: 55vh; min-height: 350px;
      background:#f8f9fa; border-radius: 16px; border: 1px solid var(--border);
    }
    
    .viewerBar{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin: 12px 0 0; }
    button.ui{
      border:1px solid var(--border); background:#fff; color:#111;
      border-radius: 12px; padding: 10px 16px; font-weight: 700; cursor:pointer;
      display: flex; align-items: center; gap: 6px; font-size: 14px;
      transition: all 0.2s;
    }
    button.ui:hover { background: #f5f5f5; transform: scale(1.02); }
    button#btnAR { background: var(--accent); color: #fff; border-color: var(--accent); }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>AR Viewer</h1>
    <p id="subText" style="color:var(--muted); margin-bottom: 20px;">3D-Modelle betrachten & teilen</p>

    <div class="card" id="uploadCard">
      <div class="uploadBox" id="uploadBox">
        <p>📁 Modell hochladen (.glb)</p>
        <input type="file" id="fileInput" accept=".glb" />
      </div>
      <div id="status" class="status"></div>
      
      <div id="shareArea">
        <div class="share-flex">
          <div class="link-box">
            <label style="font-size: 12px; font-weight: bold; color: var(--muted);">Teilen-Link (24h):</label>
            <div id="shareLinkDisplay" class="shareLinkBox" onclick="copyLink()"></div>
            <small style="color: #999;">Klicken zum Kopieren</small>
          </div>
          <div id="qrcode"></div>
        </div>
      </div>
    </div>

    <div class="card viewerBox" id="viewerBox">
      <model-viewer id="mv" camera-controls auto-rotate ar ar-modes="webxr scene-viewer quick-look" bounds="tight" shadow-intensity="1"></model-viewer>
      <div class="viewerBar">
        <button class="ui" id="btnReset">↩️ Reset</button>
        <button class="ui" id="btnFullscreen">⛶ Vollbild</button>
        <button class="ui" id="btnAR">📱 AR starten</button>
        <button class="ui" id="btnDownload" style="display:none;">💾 Download</button>
      </div>
      <p style="font-size: 11px; margin-top: 15px; color: #bbb;">Powered by Snap2XR</p>
    </div>
  </div>

  <script>
    const mv = document.getElementById('mv');
    const viewerBox = document.getElementById('viewerBox');
    const status = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');
    const uploadBox = document.getElementById('uploadBox');
    const shareArea = document.getElementById('shareArea');
    const shareLinkDisplay = document.getElementById('shareLinkDisplay');
    const qrcodeDiv = document.getElementById('qrcode');
    const btnDownload = document.getElementById('btnDownload');

    let currentUrl = "";

    function showStatus(msg, type) {
      status.textContent = msg;
      status.className = `status ${type}`;
      status.style.display = 'block';
    }

    function getTimestampName() {
      const now = new Date();
      return `Modell_${String(now.getDate()).padStart(2,'0')}-${String(now.getMonth()+1).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}.glb`;
    }

    async function triggerDownload(url) {
      if (!url) return;
      const fileName = getTimestampName();
      try {
        const response = await fetch(url);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl; a.download = fileName;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(blobUrl);
      } catch (e) { window.open(url, '_blank'); }
    }

    async function backgroundUpload(blob) {
      const fd = new FormData();
      fd.append('reqtype', 'fileupload');
      fd.append('time', '24h');
      fd.append('fileToUpload', blob, "model.glb");

      try {
        const res = await fetch('https://litterbox.catbox.moe/resources/internals/api.php', { method: 'POST', body: fd });
        const fileUrl = await res.text();
        if (!fileUrl.startsWith('http')) throw new Error();

        currentUrl = window.location.origin + window.location.pathname + '?model=' + encodeURIComponent(fileUrl.trim());
        
        shareLinkDisplay.textContent = currentUrl;
        qrcodeDiv.innerHTML = "";
        new QRCode(qrcodeDiv, { text: currentUrl, width: 80, height: 80 });
        
        shareArea.style.display = "block";
        showStatus("✅ Modell bereit & Cloud-Link erstellt!", "success");
        btnDownload.style.display = "inline-block";
      } catch(e) {
        console.error("Upload Fehler:", e);
        showStatus("⚠️ Modell geladen, Cloud-Upload fehlgeschlagen.", "loading");
      }
    }

    uploadBox.onclick = () => fileInput.click();
    fileInput.onchange = (e) => { 
      if (e.target.files[0]) {
        const file = e.target.files[0];
        mv.src = URL.createObjectURL(file);
        viewerBox.classList.add('active');
        showStatus("🚀 Modell wird verarbeitet...", "loading");
        backgroundUpload(file);
      }
    };

    window.copyLink = () => {
      navigator.clipboard.writeText(currentUrl).then(() => alert("Link kopiert!"));
    };

    document.getElementById('btnReset').onclick = () => { mv.cameraOrbit = '0deg 75deg auto'; mv.fieldOfView = 'auto'; };
    document.getElementById('btnFullscreen').onclick = () => { mv.requestFullscreen(); };
    document.getElementById('btnAR').onclick = () => { mv.activateAR(); };
    btnDownload.onclick = () => triggerDownload(mv.src);

    // URL Parameter auswerten
    const params = new URLSearchParams(window.location.search);
    const tripoParam = params.get('tripo');
    const modelParam = params.get('model');

    if (tripoParam) {
      // WICHTIG: URLSearchParams.get dekodiert bereits automatisch einmal!
      mv.src = tripoParam; 
      viewerBox.classList.add('active');
      showStatus("⚡ Blitz-Modus: Modell wird geladen...", "loading");

      fetch(tripoParam)
        .then(res => {
          if(!res.ok) throw new Error();
          return res.blob();
        })
        .then(blob => backgroundUpload(blob))
        .catch(err => {
          console.warn("Hintergrund-Upload nicht möglich (CORS oder Link abgelaufen).");
        });
    } else if (modelParam) {
      mv.src = modelParam;
      viewerBox.classList.add('active');
      btnDownload.style.display = "inline-block";
      showStatus("📦 Cloud-Modell geladen", "success");
      
      currentUrl = window.location.href;
      shareLinkDisplay.textContent = currentUrl;
      qrcodeDiv.innerHTML = "";
      new QRCode(qrcodeDiv, { text: currentUrl, width: 80, height: 80 });
      shareArea.style.display = "block";
    }
  </script>
</body>
</html>
