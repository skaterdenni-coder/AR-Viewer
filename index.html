<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Model Viewer</title>
    <script src="https://threejs.org/build/three.js"></script>
    <script src="https://threejs.org/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <h1>Drag and Drop AR Model Viewer</h1>
    <div id="drop-zone" style="width: 100%; height: 500px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center;">
        <p>Drag and drop GLB/USDZ files here</p>
    </div>
    <div id="viewer" style="width: 100%; height: 100%;"></div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const viewer = document.getElementById('viewer');
        let scene, camera, renderer;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            viewer.appendChild(renderer.domElement);
            camera.position.z = 5;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        dropZone.addEventListener('dragover', (event) => {
            event.preventDefault();
        });

        dropZone.addEventListener('drop', (event) => {
            event.preventDefault();
            const files = event.dataTransfer.files;
            if (files.length > 0) {
                loadModels(files);
            }
        });

        function loadModels(files) {
            for (const file of files) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const arrayBuffer = event.target.result;
                    const blob = new Blob([arrayBuffer], { type: file.type });
                    const url = URL.createObjectURL(blob);
                    if (file.type === 'model/gltf+json' || file.type === 'model/vnd.usdz') {
                        const loader = new THREE.GLTFLoader();
                        loader.load(url, (gltf) => {
                            scene.add(gltf.scene);
                        });
                    }
                };
                reader.readAsArrayBuffer(file);
            }
        }

        init();
    </script>
</body>
</html>
