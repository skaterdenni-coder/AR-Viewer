  <script>
    const mv = document.getElementById('mv');
    const viewerBox = document.getElementById('viewerBox');
    const status = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');
    const uploadBox = document.getElementById('uploadBox');
    const shareArea = document.getElementById('shareArea');
    const shareLinkDisplay = document.getElementById('shareLinkDisplay');
    const qrcodeDiv = document.getElementById('qrcode');
    const btnDownload = document.getElementById('btnDownload');

    let currentUrl = "";

    // NEU: Logik zur Erkennung der Endung trotz URL-Parametern
    function isGlbUrl(url) {
      if (!url) return false;
      try {
        // Extrahiert den Pfad vor dem "?" und prüft auf .glb
        const path = new URL(url).pathname;
        return path.toLowerCase().endsWith('.glb');
      } catch (e) {
        // Fallback für ungültige URLs oder Fragmente
        return url.split('?')[0].toLowerCase().endsWith('.glb');
      }
    }

    function showStatus(msg, type) {
      status.textContent = msg;
      status.className = `status ${type}`;
      status.style.display = 'block';
    }

    function getTimestampName() {
      const now = new Date();
      return `Modell_${String(now.getDate()).padStart(2,'0')}-${String(now.getMonth()+1).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}.glb`;
    }

    async function triggerDownload(url) {
      if (!url) return;
      const fileName = getTimestampName();
      try {
        const response = await fetch(url);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl; a.download = fileName;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(blobUrl);
      } catch (e) { window.open(url, '_blank'); }
    }

    async function uploadBlobToLitterbox(blob) {
      const fd = new FormData();
      fd.append('reqtype', 'fileupload');
      fd.append('time', '24h');
      fd.append('fileToUpload', blob, "model.glb");

      try {
        const res = await fetch('https://litterbox.catbox.moe/resources/internals/api.php', { method: 'POST', body: fd });
        const fileUrl = await res.text();
        if (!fileUrl.startsWith('http')) throw new Error();

        currentUrl = window.location.origin + window.location.pathname + '?model=' + encodeURIComponent(fileUrl.trim());
        
        shareLinkDisplay.textContent = currentUrl;
        qrcodeDiv.innerHTML = "";
        new QRCode(qrcodeDiv, { text: currentUrl, width: 80, height: 80 });
        
        shareArea.style.display = "block";
        showStatus("Link erstellt!", "success");
        
        mv.src = fileUrl.trim();
        btnDownload.style.display = "inline-block";
      } catch(e) {
        showStatus("⚠️ Modell geladen, aber Cloud-Link konnte nicht erstellt werden.", "loading");
      }
    }

    uploadBox.onclick = () => fileInput.click();
    fileInput.onchange = (e) => { 
      if (e.target.files[0]) {
        const file = e.target.files[0];
        mv.src = URL.createObjectURL(file);
        viewerBox.classList.add('active');
        showStatus("🚀 Modell geladen. Cloud-Upload läuft...", "loading");
        uploadBlobToLitterbox(file);
      }
    };

    window.copyLink = () => {
      navigator.clipboard.writeText(currentUrl).then(() => alert("Link kopiert!"));
    };

    document.getElementById('btnReset').onclick = () => { mv.cameraOrbit = '0deg 75deg auto'; };
    document.getElementById('btnFullscreen').onclick = () => { mv.requestFullscreen(); };
    document.getElementById('btnAR').onclick = () => { mv.activateAR(); };
    btnDownload.onclick = () => triggerDownload(mv.src);

    // --- Angepasste Logik beim Laden der Seite ---
    const params = new URLSearchParams(window.location.search);
    const tripoParam = params.get('tripo');
    const modelParam = params.get('model');

    if (tripoParam && isGlbUrl(tripoParam)) {
      mv.src = tripoParam;
      viewerBox.classList.add('active');
      showStatus("⚡ Blitz-Modus: Modell wird geladen...", "loading");

      fetch(tripoParam)
        .then(res => res.blob())
        .then(blob => {
          showStatus("🔄 Modell geladen. Erstelle Link...", "loading");
          uploadBlobToLitterbox(blob);
        })
        .catch(err => {
          showStatus("❌ Fehler beim Laden des Tripo-Modells.", "loading");
        });
    } 
    else if (modelParam && isGlbUrl(modelParam)) {
      mv.src = modelParam;
      viewerBox.classList.add('active');
      btnDownload.style.display = "inline-block";
      showStatus("📦 Modell geladen", "success");
      
      currentUrl = window.location.href;
      shareLinkDisplay.textContent = currentUrl;
      qrcodeDiv.innerHTML = "";
      new QRCode(qrcodeDiv, { text: currentUrl, width: 80, height: 80 });
      shareArea.style.display = "block";
    }
  </script>
</body>
</html>
