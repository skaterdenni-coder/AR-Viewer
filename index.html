<script>
    const mv = document.getElementById('mv');
    const viewerBox = document.getElementById('viewerBox');
    const status = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');
    const uploadBox = document.getElementById('uploadBox');
    const shareArea = document.getElementById('shareArea');
    const shareLinkDisplay = document.getElementById('shareLinkDisplay');
    const qrcodeDiv = document.getElementById('qrcode');
    const btnDownload = document.getElementById('btnDownload');

    let currentUrl = "";

    function showStatus(msg, type) {
      status.textContent = msg;
      status.className = `status ${type}`;
      status.style.display = 'block';
    }

    function getTimestampName() {
      const now = new Date();
      return `Modell_${String(now.getDate()).padStart(2,'0')}-${String(now.getMonth()+1).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}.glb`;
    }

    // Verbesserter Upload: Lädt hoch, ohne die Anzeige im Viewer zu stören
    async function backgroundUpload(blob) {
      const fd = new FormData();
      fd.append('reqtype', 'fileupload');
      fd.append('time', '24h');
      fd.append('fileToUpload', blob, "model.glb");

      try {
        const res = await fetch('https://litterbox.catbox.moe/resources/internals/api.php', { method: 'POST', body: fd });
        const fileUrl = await res.text();
        if (!fileUrl.startsWith('http')) throw new Error();

        currentUrl = window.location.origin + window.location.pathname + '?model=' + encodeURIComponent(fileUrl.trim());
        
        shareLinkDisplay.textContent = currentUrl;
        qrcodeDiv.innerHTML = "";
        new QRCode(qrcodeDiv, { text: currentUrl, width: 80, height: 80 });
        
        shareArea.style.display = "block";
        showStatus("✅ Modell bereit & permanenter Link erstellt!", "success");
        btnDownload.style.display = "inline-block";
        
        // Wir setzen mv.src NICHT neu, wenn es schon von Tripo lädt, 
        // um den Ladevorgang nicht zu unterbrechen.
        if (!mv.src || mv.src.startsWith('blob:')) {
            mv.src = fileUrl;
        }
      } catch(e) {
        console.error("Upload Fehler:", e);
      }
    }

    uploadBox.onclick = () => fileInput.click();
    fileInput.onchange = (e) => { 
      if (e.target.files[0]) {
        const file = e.target.files[0];
        mv.src = URL.createObjectURL(file);
        viewerBox.classList.add('active');
        showStatus("🚀 Modell geladen. Cloud-Upload läuft...", "loading");
        backgroundUpload(file);
      }
    };

    window.copyLink = () => {
      navigator.clipboard.writeText(currentUrl).then(() => alert("Link kopiert!"));
    };

    document.getElementById('btnReset').onclick = () => { mv.cameraOrbit = '0deg 75deg auto'; };
    document.getElementById('btnFullscreen').onclick = () => { mv.requestFullscreen(); };
    document.getElementById('btnAR').onclick = () => { mv.activateAR(); };
    btnDownload.onclick = () => triggerDownload(mv.src);

    const params = new URLSearchParams(window.location.search);
    
    if (params.get('tripo')) {
      const tripoUrl = decodeURIComponent(params.get('tripo'));
      mv.src = tripoUrl; // Sofort laden
      viewerBox.classList.add('active');
      showStatus("⚡ Blitz-Modus: Modell wird geladen...", "loading");

      // Im Hintergrund zu Litterbox schieben
      fetch(tripoUrl)
        .then(res => res.blob())
        .then(blob => backgroundUpload(blob))
        .catch(err => {
          console.warn("Background Upload fehlgeschlagen, Modell wird trotzdem angezeigt.");
        });
    } else if (params.get('model')) {
      const modelUrl = decodeURIComponent(params.get('model'));
      mv.src = modelUrl;
      viewerBox.classList.add('active');
      btnDownload.style.display = "inline-block";
      showStatus("📦 Modell geladen", "success");
      
      currentUrl = window.location.href;
      shareLinkDisplay.textContent = currentUrl;
      new QRCode(qrcodeDiv, { text: currentUrl, width: 80, height: 80 });
      shareArea.style.display = "block";
    }
</script>
