<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Model Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    :root {
      --bg: #f5f6f7; 
      --text: #111; 
      --muted: #555; 
      --card: #fff; 
      --border: #e6e6e6;
      --btn2: #2d7d46;
      --viewer-bg: #ffffff;
    }

    body.dark-mode {
      --bg: #1a1a1a; 
      --text: #e0e0e0; 
      --muted: #aaa; 
      --card: #2d2d2d; 
      --border: #444; 
      --btn2: #4caf50;
      --viewer-bg: #222222;
    }

    body.offwhite-mode {
      --bg: #efebe2;    
      --card: #fdfcf8;  
      --border: #dcd7ca;
      --text: #4a4539; 
      --muted: #7a7569; 
      --btn2: #8b7355;
      --viewer-bg: #efebe2;
    }

    * { box-sizing: border-box; }
    body { margin:0; font-family: Arial, sans-serif; background:var(--bg); color:var(--text); transition: background 0.3s, color 0.3s; }
    
    .wrap { max-width: 980px; margin: 0 auto; padding: 26px 16px 42px; text-align:center; }
    
    .theme-toggle {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      background: var(--card); border: 1px solid var(--border); 
      color: var(--text); padding: 10px 15px; border-radius: 20px; 
      cursor: pointer; font-weight: bold;
    }

    h1 { margin: 6px 0 10px; font-size: 34px; font-weight: 800; }
    
    .card {
      background:var(--card); border:1px solid var(--border); border-radius:14px;
      padding: 20px; margin: 14px auto; box-shadow: 0 1px 0 rgba(0,0,0,.03);
    }
    
    .uploadBox {
      background: var(--bg); border: 2px dashed var(--btn2);
      border-radius: 12px; padding: 40px 20px; text-align: center;
      cursor: pointer;
    }

    .uploadBox p { margin: 0; color: var(--muted); font-size: 16px; }
    .uploadBox input{ display: none; }
    
    .status { padding: 12px; margin: 10px 0; border-radius: 6px; display: none; font-weight: 600; text-align: center; }
    .status.success { background: #d4edda; color: #155724; }
    .status.loading { background: #d1ecf1; color: #0c5460; }

    #shareArea { display: none; margin-top: 15px; }
    .share-flex { 
      display: flex; align-items: center; justify-content: center; 
      gap: 20px; background: rgba(0,0,0,0.02); padding: 15px; border-radius: 10px; border: 1px solid var(--border);
    }
    .link-box { flex: 1; text-align: left; }
    .shareLinkBox {
      background: var(--bg); border: 1px solid var(--border); padding: 10px;
      margin-top: 5px; border-radius: 8px; font-family: monospace;
      font-size: 12px; color: var(--btn2); cursor: pointer; word-break: break-all;
    }

    .viewerBox { background:var(--card); border:1px solid var(--border); border-radius:14px; padding: 12px; margin-top: 18px; display: none; }
    .viewerBox.active { display: block; }
    
    model-viewer {
      width: 100%; height: 60vh; min-height: 380px;
      background: var(--viewer-bg); border-radius: 12px; border: 1px solid var(--border);
    }
    
    .viewerBar { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin: 12px 0 0; }
    button.ui {
      border:1px solid var(--border); background:var(--card); color:var(--text);
      border-radius: 10px; padding: 10px 12px; font-weight: 700; cursor:pointer;
    }
  </style>
</head>

<body>
  <button class="theme-toggle" id="themeToggle">🌓 Theme</button>
  
  <div class="wrap">
    <h1>AR Model Viewer</h1>
    
    <div class="card" id="uploadCard">
      <div class="uploadBox" id="uploadBox">
        <p>📁 Neues Modell hochladen (.glb)</p>
        <input type="file" id="fileInput" accept=".glb" />
      </div>
      <div id="status" class="status"></div>
      
      <div id="shareArea">
        <div class="share-flex">
          <div class="link-box">
            <label style="font-size: 12px; font-weight: bold;">Teilen-Link:</label>
            <div id="shareLinkDisplay" class="shareLinkBox" onclick="copyLink()"></div>
          </div>
          <div id="qrcode"></div>
        </div>
      </div>
    </div>

    <div class="card viewerBox" id="viewerBox">
      <model-viewer id="mv" camera-controls auto-rotate ar ar-modes="webxr scene-viewer quick-look" bounds="tight" autoplay></model-viewer>
      <div class="viewerBar">
        <button class="ui" id="btnReset">↩️ Reset</button>
        <button class="ui" id="btnFullscreen">⛶ Vollbild</button>
        <button class="ui" id="btnAR">AR starten</button>
      </div>
    </div>
  </div>

  <script>
    // Theme Umschalter Logik
    const btn = document.getElementById('themeToggle');
    const b = document.body;
    let mode = 0; // 0: Standard, 1: Dark, 2: Offwhite

    btn.onclick = () => {
      b.classList.remove('dark-mode', 'offwhite-mode');
      mode = (mode + 1) % 3;
      if(mode === 1) b.classList.add('dark-mode');
      if(mode === 2) b.classList.add('offwhite-mode');
    };

    // Upload & Viewer Logik
    const mv = document.getElementById('mv');
    const fileInput = document.getElementById('fileInput');
    
    document.getElementById('uploadBox').onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        if (e.target.files[0]) {
            mv.src = URL.createObjectURL(e.target.files[0]);
            document.getElementById('viewerBox').classList.add('active');
        }
    };

    document.getElementById('btnReset').onclick = () => { mv.cameraOrbit = '0deg 75deg auto'; mv.currentTime = 0; };
    document.getElementById('btnFullscreen').onclick = () => { mv.requestFullscreen(); };
    document.getElementById('btnAR').onclick = () => { mv.activateAR(); };
    
    const params = new URLSearchParams(window.location.search);
    if (params.get('model')) {
        mv.src = params.get('model');
        document.getElementById('viewerBox').classList.add('active');
    }
  </script>
</body>
</html>
