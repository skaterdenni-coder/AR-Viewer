<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Model Viewer - Turbo Load</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  
  <style>
    :root{
      --bg:#f5f6f7; --text:#111; --muted:#555; --card:#fff; --border:#e6e6e6;
      --btn2:#2d7d46;
    }
    * { box-sizing: border-box; }
    body{ margin:0; font-family: Arial, sans-serif; background:var(--bg); color:var(--text); }
    .wrap{ max-width: 980px; margin: 0 auto; padding: 26px 16px 42px; text-align:center; }
    h1{ margin: 6px 0 10px; font-size: 34px; font-weight: 800; }
    
    .card{
      background:var(--card); border:1px solid var(--border); border-radius:14px;
      padding: 20px; margin: 14px auto;
      box-shadow: 0 1px 0 rgba(0,0,0,.03);
    }
    
    .uploadBox{
      background: #f0f8f4; border: 2px dashed var(--btn2);
      border-radius: 12px; padding: 40px 20px; text-align: center;
      cursor: pointer; transition: all 0.3s;
    }
    .uploadBox:hover{ background: #e8f5f0; }
    .uploadBox p{ margin: 0; color: var(--muted); font-size: 16px; }
    .uploadBox input{ display: none; }
    
    .status{
      padding: 12px; margin: 10px 0; border-radius: 6px;
      display: none; font-weight: 600; text-align: center;
      word-break: break-all;
    }
    .status.success{ display: block; background: #d4edda; color: #155724; }
    .status.error{ display: block; background: #f8d7da; color: #721c24; }
    .status.loading{ display: block; background: #d1ecf1; color: #0c5460; }
    
    .viewerBox{
      background:var(--card); border:1px solid var(--border); border-radius:14px;
      padding: 12px; margin-top: 18px;
      display: none;
    }
    .viewerBox.active{ display: block; }
    
    model-viewer{
      width: 100%; height: 60vh; min-height: 380px;
      background:#fff; border-radius: 12px;
      border: 1px solid var(--border);
    }
    
    .viewerBar{
      display:flex; gap:10px; flex-wrap:wrap;
      justify-content:center; margin: 12px 0 0;
    }

    button.ui{
      border:1px solid var(--border); background:#fff; color:#111;
      border-radius: 10px; padding: 10px 12px; font-weight: 700; cursor:pointer;
    }
    button.ui:hover{ background:#f0f0f0; }

    .shareLinkBox {
      background: #f9f9f9; border: 1px solid #ccc; padding: 10px;
      margin-top: 10px; border-radius: 8px; font-family: monospace;
      font-size: 12px; color: #004a99; cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>AR Model Viewer</h1>
    <p>3D-Modell sofort ansehen & im Hintergrund teilen</p>

    <div class="card" id="uploadCard">
      <div class="uploadBox" id="uploadBox">
        <p>📁 .glb Datei hierher ziehen oder klicken</p>
        <input type="file" id="fileInput" accept=".glb" />
      </div>
      <div id="status" class="status"></div>
    </div>

    <div class="card viewerBox" id="viewerBox">
      <model-viewer id="mv" 
        camera-controls auto-rotate shadow-intensity="1" 
        ar ar-modes="webxr scene-viewer quick-look" 
        ar-placement="floor" bounds="tight">
      </model-viewer>

      <div class="viewerBar">
        <button class="ui" id="btnReset">↩️ Reset</button>
        <button class="ui" id="btnFullscreen">⛶ Vollbild</button>
        <button class="ui" id="btnAR">AR starten</button>
      </div>
      <p style="font-size: 11px; color:#888; margin-top:15px;">Created by Simba | 2026</p>
    </div>
  </div>

  <script>
    const mv = document.getElementById('mv');
    const viewerBox = document.getElementById('viewerBox');
    const status = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');
    const uploadBox = document.getElementById('uploadBox');

    function showStatus(message, type) {
      status.innerHTML = message;
      status.className = `status ${type}`;
      status.style.display = 'block';
    }

    // 1. Geteiltes Modell laden (URL Parameter)
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const modelUrl = params.get('model');
      if (modelUrl) {
        showStatus('⏳ Geteiltes Modell wird geladen...', 'loading');
        mv.src = modelUrl;
        viewerBox.classList.add('active');
      }
    });

    // 2. Upload Logik
    uploadBox.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleUpload(e.target.files[0]);
    });

    async function handleUpload(file) {
      if (!file.name.endsWith('.glb')) {
        showStatus('❌ Bitte nur .glb Dateien!', 'error');
        return;
      }
      
      // --- SCHRITT 1: Sofortige lokale Anzeige ---
      const localUrl = URL.createObjectURL(file);
      mv.src = localUrl;
      viewerBox.classList.add('active');
      showStatus('🚀 Modell wird lokal geladen... Cloud-Upload läuft im Hintergrund.', 'loading');

      // --- SCHRITT 2: Hintergrund Upload ---
      const formData = new FormData();
      formData.append('reqtype', 'fileupload');
      formData.append('time', '24h');
      formData.append('fileToUpload', file);

      try {
        const response = await fetch('https://litterbox.catbox.moe/resources/internals/api.php', {
          method: 'POST', body: formData
        });
        const cloudUrl = await response.text();
        
        if (!cloudUrl.startsWith('http')) throw new Error('Upload fehlgeschlagen');

        // Link generieren
        const shareUrl = window.location.origin + window.location.pathname + '?model=' + encodeURIComponent(cloudUrl);
        
        // Update Status ohne den Viewer zu stören
        showStatus(`✅ Modell bereit!<br>
                    <div class="shareLinkBox" onclick="copyLink('${shareUrl}')">${shareUrl}</div>
                    <small>(Klicken zum Kopieren)</small>`, 'success');

        // Wichtig: Für AR auf manchen Geräten tauschen wir die Quelle nun gegen die echte URL aus
        mv.src = cloudUrl; 

      } catch (err) {
        showStatus('⚠️ Lokal geladen, aber Cloud-Upload (Teilen) fehlgeschlagen.', 'error');
      }
    }

    window.copyLink = function(text) {
      navigator.clipboard.writeText(text).then(() => alert('Link kopiert!'));
    };

    // UI Buttons
    document.getElementById('btnReset').onclick = () => { mv.cameraOrbit = '0deg 75deg auto'; };
    document.getElementById('btnFullscreen').onclick = () => { if (!document.fullscreenElement) mv.requestFullscreen(); else document.exitFullscreen(); };
    document.getElementById('btnAR').onclick = () => { mv.activateAR(); };
  </script>
</body>
</html>
